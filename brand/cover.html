<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1500px;height:500px;overflow:hidden}
.cover{position:relative;width:1500px;height:500px;overflow:hidden;color:#fff;font-family:"Space Grotesk",sans-serif;
  background:radial-gradient(900px 600px at 78% 25%, #16223a, #0a0e16 70%)}
.ribbon{position:absolute;left:0;right:0;bottom:0;height:12px;
  background:linear-gradient(90deg,#1E9B4B,#FFC400,#0A3478,#ED2939,#1E9B4B)}
.split{position:absolute;right:0;top:0;width:520px;height:500px;opacity:.92;
  clip-path:polygon(30% 0,100% 0,100% 100%,0 100%);
  background:linear-gradient(135deg,#1E9B4B 0 50%,#0A3478 50% 100%)}
.vsorb{position:absolute;right:236px;top:202px;width:96px;height:96px;border-radius:50%;background:#fff;color:#0a0e16;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:34px;box-shadow:0 10px 34px rgba(0,0,0,.45)}
.brand{position:absolute;left:78px;top:52px;display:flex;align-items:center;gap:18px}
.orb{width:48px;height:48px;border-radius:50%;background:conic-gradient(from 212deg,#1E9B4B,#FFC400,#0A3478,#ED2939,#1E9B4B);
  box-shadow:inset 0 0 0 5px rgba(255,255,255,.05)}
.bname{font-weight:700;font-size:46px;letter-spacing:.5px;text-transform:uppercase}
.tagline{position:absolute;left:78px;top:168px;font-weight:700;font-size:64px;line-height:1.02;letter-spacing:-1.5px}
.tagline em{font-style:normal;color:#FF4D5E}
.sub{position:absolute;left:80px;top:332px;font-family:"Inter",sans-serif;font-weight:500;font-size:22px;color:#9AA7B8;letter-spacing:.4px}
.url{position:absolute;right:96px;bottom:54px;display:inline-flex;align-items:center;gap:12px;
  background:#FFC400;color:#0a0e16;font-weight:700;font-size:34px;padding:14px 26px;border-radius:999px;letter-spacing:.2px;
  box-shadow:0 10px 30px rgba(0,0,0,.35)}
.url .dot{width:14px;height:14px;border-radius:50%;background:#0a0e16}
</style></head>
<body><div class="cover">
  <div class="split"></div>
  <div class="vsorb">VS</div>
  <div class="brand"><span class="orb"></span><span class="bname">Sportacle</span></div>
  <div class="tagline">Win your group.<br>Now meet your <em>foe</em>.</div>
  <div class="sub">World Cup 2026 knockout forecasts, updated as results land</div>
  <div class="url"><span class="dot"></span>gosportacle.com</div>
  <div class="ribbon"></div>
</div></body></html>
