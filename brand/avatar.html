<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:800px;height:800px;overflow:hidden}
.bg{width:800px;height:800px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 36%, #1b2740, #0a0e16 72%);font-family:"Space Grotesk",sans-serif}
.orb{width:372px;height:372px;border-radius:50%;position:relative;
  background:conic-gradient(from 212deg,#1E9B4B,#FFC400,#0A3478,#ED2939,#1E9B4B);
  box-shadow:0 22px 70px rgba(0,0,0,.6), inset 0 0 0 9px rgba(255,255,255,.05)}
.orb::after{content:"";position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 35% 28%, rgba(255,255,255,.6), rgba(255,255,255,0) 40%),
             radial-gradient(circle at 64% 80%, rgba(0,0,0,.4), rgba(0,0,0,0) 52%)}
.wordmark{margin-top:48px;font-weight:700;font-size:66px;letter-spacing:1.5px;color:#fff;text-transform:uppercase}
</style></head>
<body><div class="bg">
  <div class="orb"></div>
  <div class="wordmark">Sportacle</div>
</div></body></html>
