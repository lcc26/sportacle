<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sportacle — Concept Lookbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0A0E16;--muted:#56627a}
  *{box-sizing:border-box}
  body{margin:0;background:#E9ECF1;color:var(--ink);font-family:"Inter",system-ui,sans-serif;padding:34px 28px}
  .wrap{max-width:1100px;margin:0 auto}
  h1{font-family:"Saira Condensed",sans-serif;font-weight:900;font-size:36px;letter-spacing:.5px;margin:0 0 6px;text-transform:uppercase}
  .lead{color:var(--muted);font-size:15px;margin:0 0 30px;line-height:1.55;max-width:640px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:30px}
  @media (max-width:780px){.grid{grid-template-columns:1fr}}
  figure{margin:0}
  .frame{position:relative;width:100%;min-width:0;aspect-ratio:1/1;overflow:hidden;border-radius:20px;background:#0A0E16;box-shadow:0 10px 34px rgba(10,14,22,.20)}
  .host{position:absolute;top:0;left:0;width:1080px;height:1080px;transform-origin:top left}
  figcaption{margin-top:13px;font-size:14.5px;line-height:1.3}
  figcaption b{font-weight:600}
  figcaption span{color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Sportacle — Concept Lookbook</h1>
  <p class="lead">Two directions (Marquee, bold / Slip, minimal) across two card types. Sample data only. Cards auto-scale to fit; resize the window to see them at any size.</p>
  <div class="grid">
    <figure><div class="frame" data-card="ticketB"></div><figcaption><b>The Ticket — B (Marquee)</b> <span>· hero matchup, bold</span></figcaption></figure>
    <figure><div class="frame" data-card="ticketA"></div><figcaption><b>The Ticket — A (Slip)</b> <span>· hero matchup, minimal</span></figcaption></figure>
    <figure><div class="frame" data-card="ladderB"></div><figcaption><b>The Ladder — B (Marquee)</b> <span>· path to final, bold</span></figcaption></figure>
    <figure><div class="frame" data-card="ladderA"></div><figcaption><b>The Ladder — A (Slip)</b> <span>· path to final, minimal</span></figcaption></figure>
  </div>
</div>
<script>

const cards = {
ticketA: `<style>
.card{width:1080px;height:1080px;padding:72px 72px 64px;display:flex;flex-direction:column;background:var(--bg);color:var(--text)}
.top{display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:14px;font-family:var(--display);font-weight:900;font-size:38px;letter-spacing:1px;color:var(--brand);text-transform:uppercase}

.question{margin-top:16px;font-family:var(--display);font-weight:700;font-size:46px;letter-spacing:.5px;color:var(--text);text-transform:uppercase;line-height:1.02}

.opp{font-family:var(--display);font-weight:900;font-size:158px;line-height:.9;letter-spacing:-1px;text-transform:uppercase;color:var(--text)}

.handle{font-family:var(--ui);font-weight:700;font-size:24px;color:var(--text)}
.handle span{color:var(--brand)}
.note{font-family:var(--ui);font-weight:600;font-size:16px;color:var(--faint);letter-spacing:2px;text-transform:uppercase}
</style>
<div class="card">
  <div class="top"><div class="brand"><span class="orb"></span>Sportacle</div><div class="ctx">World Cup 2026</div></div>
  <div class="scenario">IF <b>BRAZIL</b> WIN GROUP G</div>

  <div class="hero"><div class="opp">South<br>Korea</div><div class="code">KOR &nbsp;·&nbsp; PROJECTED GROUP E RUNNER-UP</div></div>
  <div class="prob">
    <div class="prow"><div class="plab">Chance of this matchup</div><div class="pnum">38%</div></div>
    <div class="bar"><i></i></div>
    <div class="alts">NEXT &nbsp; <b>URUGUAY</b> 24% &nbsp;·&nbsp; <b>GHANA</b> 19% &nbsp;·&nbsp; FIELD 19%</div>
  </div>
  <div class="foot"><div class="handle">@<span>TheSportacle</span></div><div class="note">Sample · engine pending</div></div>
</div>`,
ticketB: `<style>

<div class="card">
  <div class="stripe"></div>
  <div class="top"><div class="brand"><span class="orb"></span>Sportacle</div><div class="kicker">The Draw · Projected</div></div>
  <div class="mid">
    <div class="steam">Brazil</div>
    <div class="scond">Win Group G, and your Round of 32 is...</div>
    <div class="reveal"><div class="rlab">Most likely opponent</div><div class="opp"><div class="oppname">South Korea</div><div class="pill">38% <span>LIKELY</span></div></div></div>
    <div class="alts">
      <div class="alt"><div class="t">Uruguay</div><div class="p">24%</div><div class="l">Next most likely</div></div>
      <div class="alt"><div class="t">Ghana</div><div class="p">19%</div><div class="l">In the mix</div></div>
      <div class="alt"><div class="t">The field</div><div class="p">19%</div><div class="l">Everyone else</div></div>
    </div>
  </div>
  <div class="foot"><div class="handle">@<span>TheSportacle</span> · gosportacle.com</div><div class="note">Sample · engine pending</div></div>
</div>`,

</style>
<div class="card">
  <div class="top"><div class="brand"><span class="orb"></span>Sportacle</div><div class="ctx">World Cup 2026</div></div>
  <div class="head"><div class="team">Argentina</div><div class="sub">Projected path to the final</div></div>
  <div class="rows">
    <div class="row"><div class="rmain"><div class="stage">R32</div><div class="opp"><small>vs</small>Nigeria</div><div class="pct">92%</div></div><div class="track"><i style="width:92%"></i></div></div>
    <div class="row"><div class="rmain"><div class="stage">R16</div><div class="opp"><small>vs</small>England</div><div class="pct">64%</div></div><div class="track"><i style="width:64%"></i></div></div>
    <div class="row"><div class="rmain"><div class="stage">QF</div><div class="opp"><small>vs</small>France</div><div class="pct">41%</div></div><div class="track"><i style="width:41%"></i></div></div>
    <div class="row"><div class="rmain"><div class="stage">SF</div><div class="opp"><small>vs</small>Spain</div><div class="pct">24%</div></div><div class="track"><i style="width:24%"></i></div></div>
    <div class="row"><div class="rmain"><div class="stage">Final</div><div class="opp"><small>vs</small>Brazil</div><div class="pct">14%</div></div><div class="track"><i style="width:14%"></i></div></div>
  </div>

</div>`,

document.querySelectorAll('.frame').forEach(frame=>{
  const host=document.createElement('div'); host.className='host';
  const root=host.attachShadow({mode:'open'});
  root.innerHTML = FONTS + TOKENS + cards[frame.dataset.card];
  frame.appendChild(host);
  const fit=()=>{ host.style.transform='scale('+(frame.clientWidth/1080)+')'; };
  fit();
  if(window.ResizeObserver){ new ResizeObserver(fit).observe(frame); }
  window.addEventListener('resize',fit);
});
</script>

</html>
