<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Sportacle Studio</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Card fonts (used by render.js to draw the cards) -->
<link href="https://fonts.googleapis.com/css2?family=Khand:wght@500;600;700&family=Barlow+Semi+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0E1116;--panel:#171C24;--line:#262D38;--ink:#F4F2EB;--muted:#9AA7B8;--accent:#1E9B4B;--amber:#FFC400}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;min-height:100vh}
button,select,input{font-family:inherit;font-size:15px}
/* gate */
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
#gate form{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:34px;width:100%;max-width:380px;text-align:center}
#gate .orb{width:34px;height:34px;border-radius:50%;margin:0 auto 14px;background:conic-gradient(from 210deg,#1E9B4B,#FFC400,#0A3478,#ED2939,#1E9B4B)}
#gate h1{font-family:"Space Grotesk";font-size:22px;letter-spacing:-.4px;margin-bottom:6px}
#gate p{color:var(--muted);font-size:13px;margin-bottom:18px}
#gate input{width:100%;padding:13px 15px;border-radius:11px;border:1px solid var(--line);background:#0E1116;color:var(--ink);margin-bottom:12px}
#gate button{width:100%;padding:13px;border-radius:11px;border:0;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}
#gate .err{color:#FF6B6B;font-size:13px;height:16px;margin-top:8px}
/* app */
header{display:flex;align-items:center;gap:12px;padding:18px 24px;border-bottom:1px solid var(--line)}
header .orb{width:22px;height:22px;border-radius:50%;background:conic-gradient(from 210deg,#1E9B4B,#FFC400,#0A3478,#ED2939,#1E9B4B)}
header b{font-family:"Space Grotesk";font-weight:700;font-size:19px;letter-spacing:-.3px}
header span{color:var(--muted);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.layout{display:grid;grid-template-columns:380px 1fr;gap:0;min-height:calc(100vh - 61px)}
.controls{padding:22px 24px;border-right:1px solid var(--line);overflow:auto}
.seg{display:flex;flex-wrap:wrap;gap:6px;background:#0E1116;border:1px solid var(--line);border-radius:12px;padding:5px;margin-bottom:22px}
.seg button{flex:1;padding:10px;border:0;border-radius:8px;background:transparent;color:var(--muted);font-weight:700;font-family:"Space Grotesk";cursor:pointer;letter-spacing:.5px}
.seg button.on{background:var(--accent);color:#fff}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.field select,.field input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:#0E1116;color:var(--ink)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hide{display:none}
.chk{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--ink);margin:2px 0 14px;cursor:pointer}
.chk input{width:18px;height:18px;accent-color:var(--accent)}
.minfo{font-size:12px;color:var(--muted);margin-bottom:6px;min-height:14px}
.dl{width:100%;margin-top:8px;padding:15px;border-radius:12px;border:0;background:var(--amber);color:#11161F;font-weight:800;font-family:"Space Grotesk";font-size:16px;letter-spacing:.3px;cursor:pointer}
.dl:active{transform:translateY(1px)}
.status{margin-top:12px;font-size:13px;color:var(--muted);min-height:18px;text-align:center}
.preview{display:flex;align-items:center;justify-content:center;padding:30px;background:radial-gradient(60% 60% at 50% 30%,#12202f,#0E1116 75%)}
.stage{width:100%;max-width:620px;border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.stage canvas{width:100%;height:auto;display:block;background:#fff}
@media (max-width:880px){.layout{grid-template-columns:1fr}.controls{border-right:0;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>

<div id="gate">
  <form id="gateForm">
    <div class="orb"></div>
    <h1>Sportacle Studio</h1>
    <p>Internal tool. Enter the passphrase.</p>
    <input id="pass" type="password" autocomplete="off" placeholder="Passphrase" autofocus>
    <button type="submit">Enter</button>
    <div class="err" id="gateErr"></div>
  </form>
</div>

<div id="app" hidden>
  <header><span class="orb"></span><b>Sportacle Studio</b><span>Internal</span></header>
  <div class="layout">
    <div class="controls">
      <div class="seg" id="seg">
        <button data-type="goal">Goal</button>
        <button data-type="half">Half</button>
        <button data-type="final" class="on">Final</button>
        <button data-type="whowins">Who Wins</button>
        <button data-type="stats">Stats</button>
        <button data-type="infographic">Fun Stats</button>
        <button data-type="standings">Standings</button>
      </div>

      <!-- result fields (final + half) -->
      <div id="resultFields">
        <div class="field"><label>Home team</label><select id="home"></select></div>
        <div class="field"><label>Away team</label><select id="away"></select></div>
        <div class="row" id="scoreRow">
          <div class="field"><label>Home goals</label><input id="hg" type="number" min="0" max="20" value="0"></div>
          <div class="field"><label>Away goals</label><input id="ag" type="number" min="0" max="20" value="0"></div>
        </div>
        <div class="field"><label>Note / prompt (optional)</label><input id="note" type="text" placeholder="e.g. Group L  ·  or a Who-Wins prompt"></div>
      </div>

      <!-- goal fields -->
      <div id="goalFields" class="hide">
        <div class="field"><label>Scoring team</label><select id="gteam"></select></div>
        <div class="field"><label>Scorer (optional)</label><input id="scorer" type="text" placeholder="e.g. Kane"></div>
        <div class="row">
          <div class="field"><label>Minute (optional)</label><input id="gmin" type="text" placeholder="e.g. 67"></div>
          <div class="field"><label>Score (optional)</label><input id="gscore" type="text" placeholder="e.g. 2-1"></div>
        </div>
        <div class="field"><label>Opponent (for scoreline, optional)</label><select id="gvs"></select></div>
        <div class="field"><label>Tag (optional)</label><input id="gtag" type="text" placeholder="Sportacle"></div>
      </div>

      <!-- stats fields -->
      <div id="statsFields" class="hide">
        <div class="field"><label>Team</label><select id="steam"></select></div>
        <div class="field"><label>Player (auto-loaded from last match)</label><select id="splayer"><option value="">Pick a team</option></select></div>
        <label class="chk"><input type="checkbox" id="smotm"> Man of the Match</label>
        <div class="minfo" id="matchinfo"></div>
      </div>

      <!-- infographic fields -->
      <div id="infographicFields" class="hide">
        <div class="field"><label>Fun stat</label><select id="metric"></select></div>
        <div class="minfo" id="infonote">Pulls every completed match. First load takes a few seconds.</div>
      </div>

      <!-- standings card fields -->
      <div id="standingsCardFields" class="hide">
        <div class="field"><label>Group</label><select id="sgroup"></select></div>
        <div class="minfo">Live games show provisional points; the group is flagged LIVE.</div>
      </div>

      <button class="dl" id="dl">Download PNG (1080x1080)</button>
      <div class="status" id="status">Preview updates live.</div>
    </div>

    <div class="preview"><div class="stage" id="stage"><canvas id="cv" width="2160" height="2160" aria-label="card preview"></canvas></div></div>
  </div>
</div>

<script src="render.js"></script>
<script>
(function(){
  // ---- soft gate (deterrent; see note to Chase). Change PASS to rotate it. ----
  var PASS = "lariat-r32";
  var gate=document.getElementById("gate"), app=document.getElementById("app");
  function unlock(){ gate.style.display="none"; app.hidden=false; init(); }
  if(localStorage.getItem("studio-ok")==="1"){ unlock(); }
  document.getElementById("gateForm").addEventListener("submit",function(e){
    e.preventDefault();
    if(document.getElementById("pass").value===PASS){ localStorage.setItem("studio-ok","1"); unlock(); }
    else document.getElementById("gateErr").textContent="Incorrect.";
  });

  var TEAMS=[], started=false, t=null, busy=false;
  var cv=document.getElementById("cv");
  var type="final";

  function init(){
    if(started) return; started=true;
    fetch("/make/teams.json").then(function(r){return r.json();}).then(function(d){
      TEAMS=d;
      ["home","away","gteam","gvs","steam"].forEach(function(id){ fillSelect(id, id==="gvs"); });
      setSel("home","England"); setSel("away","Croatia");
      setSel("gteam","England"); setSel("gvs","Croatia"); setSel("steam","England");
      document.getElementById("hg").value="4"; document.getElementById("ag").value="2";
      var mo=document.getElementById("metric"); mo.innerHTML=Object.keys(METRICS).map(function(k){return '<option value="'+k+'">'+METRICS[k].title+'</option>';}).join("");
      var sg=document.getElementById("sgroup"); sg.innerHTML="ABCDEFGHIJKL".split("").map(function(L){return '<option value="Group '+L+'">Group '+L+'</option>';}).join("");
      wire(); draw();
      var demo=new URLSearchParams(location.search).get("demo");
      if(demo){ var db=document.querySelector('#seg button[data-type="'+demo+'"]'); if(db) db.click(); }
    });
  }
  function fillSelect(id, blankFirst){
    var s=document.getElementById(id), html=blankFirst?'<option value="">None</option>':"";
    TEAMS.forEach(function(t){ html+='<option value="'+t.name+'" data-code="'+t.code+'" data-color="'+t.color+'">'+t.name+'</option>'; });
    s.innerHTML=html;
  }
  function setSel(id,name){ var s=document.getElementById(id); for(var i=0;i<s.options.length;i++){ if(s.options[i].value===name){ s.selectedIndex=i; break; } } }
  function opt(id){ var s=document.getElementById(id); return s.options[s.selectedIndex]||{}; }
  function val(id){ return (document.getElementById(id).value||"").trim(); }

  // Build the params object the native canvas renderer (render.js) expects.
  function buildParams(){
    if(type==="goal"){
      var tm=opt("gteam");
      var p={team:tm.value||"", code:tm.getAttribute("data-code")||"", tc:tm.getAttribute("data-color")||"#1E9B4B", tag:val("gtag")||"Sportacle", home:"1"};
      if(val("scorer")) p.scorer=val("scorer");
      if(val("gmin")) p.min=val("gmin");
      var sc=val("gscore"), vs=opt("gvs");
      if(sc && vs && vs.value){ p.score=sc; p.vs=vs.getAttribute("data-code")||""; }
      return p;
    }
    if(type==="whowins"){
      var wh=opt("home"), wa=opt("away");
      var wp={an:wh.value||"", ac:wh.getAttribute("data-code")||"", acolor:wh.getAttribute("data-color")||"#1E9B4B",
              bn:wa.value||"", bc:wa.getAttribute("data-code")||"", bcolor:wa.getAttribute("data-color")||"#C8102E"};
      if(val("note")) wp.prompt=val("note");
      return wp;
    }
    if(type==="stats"){
      var st=opt("steam"), sp={team:st.value, color:st.getAttribute("data-color")||"#1E9B4B", context:statsCtx, motm:document.getElementById("smotm").checked};
      if(statsData && statsData.players.length){
        var q=statsData.players[parseInt(opt("splayer").value||"0",10)]||statsData.players[0];
        sp.player=q.athlete.displayName; sp.jersey=q.jersey||"";
        var pos=(q.position||{}).abbreviation||""; sp.position=posName(pos);
        if(pos==="G"||pos==="GK"){
          sp.stats=[{label:"Saves",value:statOf(q,"saves")||"0"},{label:"Conceded",value:statOf(q,"goalsConceded")||"0"},{label:"Shots Faced",value:statOf(q,"shotsFaced")||"0"}];
        } else {
          sp.stats=[{label:"Goals",value:statOf(q,"totalGoals")||"0"},{label:"Assists",value:statOf(q,"goalAssists")||"0"},{label:"Shots",value:statOf(q,"totalShots")||"0"},{label:"On Target",value:statOf(q,"shotsOnTarget")||"0"}];
        }
      } else { sp.player="Pick a team"; sp.stats=[]; }
      return sp;
    }
    var h=opt("home"), a=opt("away");
    var pp={an:h.value||"", ac:h.getAttribute("data-code")||"", acolor:h.getAttribute("data-color")||"#1E9B4B",
            bn:a.value||"", bc:a.getAttribute("data-code")||"", bcolor:a.getAttribute("data-color")||"#C8102E",
            hg:val("hg")||"0", ag:val("ag")||"0"};
    if(val("note")) pp.note=val("note");
    if(type==="half"){ pp.label="Half Time"; pp.lc="#FFC400"; } else { pp.label="Full Time"; }
    return pp;
  }
  function rtype(){ return type==="goal"?"goal":(type==="whowins"?"whowins":(type==="stats"?"stats":"final")); }
  var statusEl=document.getElementById("status");

  // ---- Stats: pull a team's last completed match + per-player stats from ESPN ----
  function normName(s){ return String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z]/g,""); }
  var CANON={drcongo:"congo",congodr:"congo",turkiye:"turkiye",turkey:"turkiye",unitedstates:"usa",usa:"usa",southkorea:"korea",korearepublic:"korea",republicofkorea:"korea",ivorycoast:"ivory",cotedivoire:"ivory",bosniaandherzegovina:"bosnia",bosniaherzegovina:"bosnia"};
  function canon(s){ var n=normName(s); return CANON[n]||n; }
  function statOf(q,name){ var a=q.stats||[]; for(var i=0;i<a.length;i++){ if(a[i].name===name) return a[i].displayValue; } return ""; }
  function posName(abbr){ abbr=String(abbr||"").toUpperCase();
    if(abbr==="G"||abbr==="GK") return "Goalkeeper";
    if(abbr==="SUB"||abbr==="") return "";
    if(/^(D|CB|CD|RB|LB|RWB|LWB|SW|FB)/.test(abbr)) return "Defender";
    if(/^(F|CF|ST|RW|LW|W)/.test(abbr)) return "Forward";
    return "Midfielder";
  }
  var ESPN="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/";
  var statsData=null, statsCtx="";
  function ymdU(ms){ var d=new Date(ms); return ""+d.getUTCFullYear()+("0"+(d.getUTCMonth()+1)).slice(-2)+("0"+d.getUTCDate()).slice(-2); }
  function loadStatsTeam(){
    var tname=opt("steam").value; if(!tname) return;
    var pl=document.getElementById("splayer"); pl.innerHTML='<option value="">Loading…</option>';
    document.getElementById("matchinfo").textContent=""; statusEl.textContent="Pulling "+tname+"'s last match…"; statsData=null;
    var now=Date.now();
    fetch(ESPN+"scoreboard?dates="+ymdU(now-13*864e5)+"-"+ymdU(now+864e5)).then(function(r){return r.json();}).then(function(d){
      var ev=null, best=0;
      (d.events||[]).forEach(function(e){
        var comp=(e.competitions||[])[0]||{}; if(!(((comp.status||{}).type)||{}).completed) return;
        if((comp.competitors||[]).some(function(c){return canon(c.team.displayName)===canon(tname);})){ var t=new Date(e.date).getTime(); if(t>best){best=t; ev=e;} }
      });
      if(!ev){ pl.innerHTML='<option value="">No recent match</option>'; statusEl.textContent="No recent completed match for "+tname+"."; draw(); return; }
      var comp=ev.competitions[0], cs=comp.competitors;
      var me=cs.filter(function(c){return canon(c.team.displayName)===canon(tname);})[0], them=cs.filter(function(c){return c!==me;})[0];
      statsCtx = me.homeAway==="home" ? (tname+" "+me.score+"-"+them.score+" "+them.team.displayName) : (them.team.displayName+" "+them.score+"-"+me.score+" "+tname);
      return fetch(ESPN+"summary?event="+ev.id).then(function(r){return r.json();}).then(function(sum){
        var ros=(sum.rosters||[]).filter(function(tt){return canon(tt.team.displayName)===canon(tname);})[0];
        if(!ros){ pl.innerHTML='<option value="">Lineup unavailable</option>'; statusEl.textContent="Lineup unavailable."; draw(); return; }
        var players=(ros.roster||[]).filter(function(q){return q.starter||q.subbedIn||statOf(q,"appearances")==="1";});
        players.sort(function(a,b){ var x=a.starter?0:1,y=b.starter?0:1; if(x!==y)return x-y; return (a.formationPlace||99)-(b.formationPlace||99); });
        statsData={team:tname, players:players};
        pl.innerHTML=players.map(function(q,i){ return '<option value="'+i+'">#'+(q.jersey||"")+"  "+q.athlete.displayName+'</option>'; }).join("") || '<option value="">No players</option>';
        document.getElementById("matchinfo").textContent="Last match: "+statsCtx;
        statusEl.textContent="Loaded "+players.length+" players."; draw();
      });
    }).catch(function(){ pl.innerHTML='<option value="">Load failed</option>'; statusEl.textContent="ESPN load failed."; });
  }

  // ---- Infographic: aggregate every completed match into per-player totals; each
  // "fun stat" is a formula over that aggregate (cached, so switching metrics is
  // instant; ages fetched lazily only for the age-based metric). ----
  var aggCache=null, lastInfoParams=null;
  function aggregate(){
    if(aggCache) return Promise.resolve(aggCache);
    return fetch(ESPN+"scoreboard?dates=20260611-"+ymdU(Date.now()+864e5)).then(function(r){return r.json();}).then(function(d){
      var ids=(d.events||[]).filter(function(e){return ((((e.competitions||[])[0]||{}).status||{}).type||{}).completed;}).map(function(e){return e.id;});
      return Promise.all(ids.map(function(id){ return fetch(ESPN+"summary?event="+id).then(function(r){return r.json();}).catch(function(){return null;}); }));
    }).then(function(sums){
      var P={};
      sums.forEach(function(sm){ if(!sm)return;
        (sm.rosters||[]).forEach(function(ros){ var team=(ros.team||{}).displayName;
          (ros.roster||[]).forEach(function(q){ var s={}; (q.stats||[]).forEach(function(x){ s[x.name]=parseInt(x.displayValue||"0",10)||0; });
            var id=q.athlete.id, dd=P[id]||(P[id]={id:id,name:q.athlete.displayName,team:team,goals:0,shots:0,sot:0,assists:0,fouls:0,yellows:0,reds:0,saves:0,conceded:0});
            dd.goals+=s.totalGoals||0; dd.shots+=s.totalShots||0; dd.sot+=s.shotsOnTarget||0; dd.assists+=s.goalAssists||0;
            dd.fouls+=s.foulsCommitted||0; dd.yellows+=s.yellowCards||0; dd.reds+=s.redCards||0; dd.saves+=s.saves||0; dd.conceded+=s.goalsConceded||0;
          });
        });
      });
      aggCache=Object.keys(P).map(function(k){return P[k];}); return aggCache;
    });
  }
  function loadAges(list){ return Promise.all(list.map(function(p){
    if(p.age!=null) return Promise.resolve();
    return fetch("https://site.api.espn.com/apis/common/v3/sports/soccer/fifa.world/athletes/"+p.id).then(function(r){return r.json();}).then(function(ad){ p.age=((ad.athlete||ad)||{}).age||null; }).catch(function(){p.age=null;});
  })); }
  function teamCode(espn){ var c=canon(espn); for(var i=0;i<TEAMS.length;i++){ if(canon(TEAMS[i].name)===c) return TEAMS[i].code; } return ""; }
  function fmt1(n){ return (Math.round(n*10)/10).toFixed(1); }
  function row(p,val,raw){ return {name:p.name, code:teamCode(p.team), value:String(val), raw:raw}; }
  var METRICS={
    lifetime:{title:"A Lifetime Per Goal",subtitle:"Age divided by goals — one strike, a whole career",accent:"#FFC400",needsAge:true,
      build:function(A){ return A.filter(function(p){return p.goals>0&&p.age;}).map(function(p){return {p:p,r:p.age/p.goals};}).sort(function(a,b){return b.r-a.r;}).slice(0,9).map(function(x){return row(x.p,fmt1(x.r),x.r);}); }},
    nogoal:{title:"All Shots, No Goal",subtitle:"Most shots without finding the net",accent:"#ED2939",
      build:function(A){ return A.filter(function(p){return p.goals===0&&p.shots>0;}).sort(function(a,b){return b.shots-a.shots;}).slice(0,9).map(function(p){return row(p,p.shots,p.shots);}); }},
    shotspergoal:{title:"Shots Per Goal",subtitle:"How many attempts each goal cost",accent:"#FF8A00",
      build:function(A){ return A.filter(function(p){return p.goals>0;}).map(function(p){return {p:p,r:p.shots/p.goals};}).sort(function(a,b){return b.r-a.r;}).slice(0,9).map(function(x){return row(x.p,fmt1(x.r),x.r);}); }},
    fouls:{title:"Foul Machine",subtitle:"The tournament's busiest hackers",accent:"#ED2939",
      build:function(A){ return A.filter(function(p){return p.fouls>0;}).sort(function(a,b){return b.fouls-a.fouls;}).slice(0,9).map(function(p){return row(p,p.fouls,p.fouls);}); }},
    cards:{title:"Card Collector",subtitle:"Yellow and red cards combined",accent:"#FFC400",
      build:function(A){ return A.map(function(p){return {p:p,c:p.yellows+p.reds,r:p.yellows+p.reds*3};}).filter(function(x){return x.c>0;}).sort(function(a,b){return b.r-a.r;}).slice(0,9).map(function(x){return row(x.p,x.c,x.c);}); }},
    assists:{title:"Assist Kings",subtitle:"Most goals teed up for team-mates",accent:"#1E9B4B",
      build:function(A){ return A.filter(function(p){return p.assists>0;}).sort(function(a,b){return b.assists-a.assists;}).slice(0,9).map(function(p){return row(p,p.assists,p.assists);}); }},
    saves:{title:"The Wall",subtitle:"Most goalkeeper saves",accent:"#2E86DE",
      build:function(A){ return A.filter(function(p){return p.saves>0;}).sort(function(a,b){return b.saves-a.saves;}).slice(0,9).map(function(p){return row(p,p.saves,p.saves);}); }}
  };
  function drawInfographic(){
    var M=METRICS[opt("metric").value]; if(!M) return Promise.resolve();
    statusEl.textContent="Crunching the numbers…";
    return aggregate().then(function(A){
      return (M.needsAge?loadAges(A.filter(function(p){return p.goals>0;})):Promise.resolve()).then(function(){
        var rows=M.build(A);
        lastInfoParams={title:M.title,subtitle:M.subtitle,footnote:"Sportacle Index · WC 2026",accent:M.accent,rows:rows};
        return window.SportacleRender.renderTo(cv,"infographic",lastInfoParams,2).then(function(){ if(!busy) statusEl.textContent=rows.length+" players · "+M.title; });
      });
    }).catch(function(e){ statusEl.textContent="Couldn't load data: "+e; });
  }

  // ---- Standings card: a group table with in-progress games folded in provisionally ----
  var STANDINGS_URL="https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings?season=2026";
  var lastStandParams=null;
  function numS(en,n){ var a=en.stats||[]; for(var i=0;i<a.length;i++){ if(a[i].name===n){ var v=parseFloat(a[i].displayValue!=null?a[i].displayValue:a[i].value); return isFinite(v)?v:0; } } return 0; }
  function prov(b,home,hs,as){ var my=home?hs:as,opp=home?as:hs; var p={P:b.P+1,W:b.W,D:b.D,L:b.L,GD:b.GD+(my-opp),Pts:b.Pts,GF:b.GF+my}; if(my>opp){p.W++;p.Pts+=3;}else if(my<opp){p.L++;}else{p.D++;p.Pts++;} return p; }
  function liveGames(d){ return (d.events||[]).filter(function(e){return ((((e.competitions||[])[0]||{}).status||{}).type||{}).state==="in";}).map(function(e){ var c=e.competitions[0].competitors, hm=c.filter(function(x){return x.homeAway==="home";})[0], aw=c.filter(function(x){return x.homeAway==="away";})[0]; return {h:hm.team.displayName,a:aw.team.displayName,hs:parseInt(hm.score||"0",10)||0,as:parseInt(aw.score||"0",10)||0}; }); }
  function drawStandingsCard(){
    var gname=opt("sgroup").value; if(!gname) return Promise.resolve();
    statusEl.textContent="Loading standings…";
    return Promise.all([fetch(STANDINGS_URL).then(function(r){return r.json();}), fetch(ESPN+"scoreboard?dates=20260611-"+ymdU(Date.now()+864e5)).then(function(r){return r.json();})]).then(function(res){
      var g=((res[0].children||[]).filter(function(x){return x.name===gname;}))[0]; if(!g){ statusEl.textContent="Group not found."; return; }
      var lg=liveGames(res[1]), groupLive=false;
      var rows=((g.standings||{}).entries||[]).map(function(en){
        var name=(en.team||{}).displayName||"";
        var base={P:numS(en,"gamesPlayed"),W:numS(en,"wins"),D:numS(en,"ties"),L:numS(en,"losses"),GD:numS(en,"pointDifferential"),Pts:numS(en,"points"),GF:numS(en,"pointsFor")};
        var s=base,isLive=false;
        for(var k=0;k<lg.length;k++){ if(canon(lg[k].h)===canon(name)){s=prov(base,true,lg[k].hs,lg[k].as);isLive=true;groupLive=true;break;} if(canon(lg[k].a)===canon(name)){s=prov(base,false,lg[k].hs,lg[k].as);isLive=true;groupLive=true;break;} }
        return {code:teamCode(name),name:name,P:s.P,W:s.W,D:s.D,L:s.L,GD:s.GD,Pts:s.Pts,GF:s.GF,live:isLive};
      });
      rows.sort(function(a,b){return (b.Pts-a.Pts)||(b.GD-a.GD)||(b.GF-a.GF);});
      lastStandParams={group:gname,live:groupLive,rows:rows};
      return window.SportacleRender.renderTo(cv,"standings",lastStandParams,2).then(function(){ if(!busy) statusEl.textContent=gname+(groupLive?" · LIVE":""); });
    }).catch(function(e){ statusEl.textContent="Standings load failed: "+e; });
  }

  // Native canvas render = the preview AND (re-run) the download. No iframe, no
  // html-to-image, no foreignObject, no network at capture: bulletproof.
  function render(){
    if(type==="infographic") return window.SportacleRender.renderTo(cv,"infographic", lastInfoParams||{rows:[]}, 2);
    if(type==="standings") return window.SportacleRender.renderTo(cv,"standings", lastStandParams||{rows:[]}, 2);
    return window.SportacleRender.renderTo(cv, rtype(), buildParams(), 2);
  }
  function draw(){
    if(type==="infographic"){ drawInfographic(); return; }
    if(type==="standings"){ drawStandingsCard(); return; }
    render().then(function(){ if(!busy) statusEl.textContent="Preview updated."; }).catch(function(e){ statusEl.textContent="Render error: "+e; });
  }
  function update(){ clearTimeout(t); t=setTimeout(draw,120); }
  function wire(){
    document.querySelectorAll("#seg button").forEach(function(b){
      b.addEventListener("click",function(){
        document.querySelectorAll("#seg button").forEach(function(x){x.classList.remove("on");});
        b.classList.add("on"); type=b.getAttribute("data-type");
        document.getElementById("resultFields").classList.toggle("hide", type==="goal"||type==="stats"||type==="infographic"||type==="standings");
        document.getElementById("goalFields").classList.toggle("hide", type!=="goal");
        document.getElementById("statsFields").classList.toggle("hide", type!=="stats");
        document.getElementById("infographicFields").classList.toggle("hide", type!=="infographic");
        document.getElementById("standingsCardFields").classList.toggle("hide", type!=="standings");
        document.getElementById("scoreRow").classList.toggle("hide", type==="whowins");
        if(type==="stats" && !statsData){ loadStatsTeam(); } else { update(); }
      });
    });
    document.querySelectorAll(".controls select, .controls input").forEach(function(el){
      el.addEventListener("input", update); el.addEventListener("change", update);
    });
    document.getElementById("steam").addEventListener("change", loadStatsTeam);
  }

  // ---- download: re-render fresh, then canvas.toBlob (same-origin canvas never taints) ----
  function slug(s){ return (s||"").toLowerCase().replace(/[^a-z0-9]+/g,""); }
  function fname(){
    var ts=String(Date.now()).slice(-6);
    if(type==="goal"){
      var parts=["sportacle","goal",(opt("gteam").getAttribute("data-code")||"x")];
      if(slug(val("scorer"))) parts.push(slug(val("scorer")));
      if(slug(val("gmin"))) parts.push(slug(val("gmin")));
      return parts.join("-")+"-"+ts+".png";
    }
    if(type==="infographic"){ return "sportacle-"+(opt("metric").value||"funstat")+"-"+ts+".png"; }
    if(type==="standings"){ return "sportacle-standings-"+(opt("sgroup").value||"x").replace(/\s+/g,"").toLowerCase()+"-"+ts+".png"; }
    if(type==="stats"){ return "sportacle-stats-"+(opt("steam").getAttribute("data-code")||"x")+"-"+ts+".png"; }
    return "sportacle-"+type+"-"+(opt("home").getAttribute("data-code")||"x")+"-"+(opt("away").getAttribute("data-code")||"x")+"-"+(val("hg")||0)+"-"+(val("ag")||0)+"-"+ts+".png";
  }
  var dlBtn=document.getElementById("dl");
  dlBtn.addEventListener("click",function(){
    if(busy) return; busy=true; dlBtn.disabled=true;
    var name=fname(); statusEl.textContent="Rendering...";
    clearTimeout(t);
    (type==="infographic"?drawInfographic():type==="standings"?drawStandingsCard():render()).then(function(){
      cv.toBlob(function(blob){
        if(!blob){ busy=false; dlBtn.disabled=false; statusEl.textContent="Export failed."; return; }
        var url=URL.createObjectURL(blob), a=document.createElement("a");
        a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
        busy=false; dlBtn.disabled=false; statusEl.textContent="Downloaded "+name;
      },"image/png");
    }).catch(function(e){ busy=false; dlBtn.disabled=false; statusEl.textContent="Export failed: "+e; });
  });
})();
</script>
</body>
