<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Sportacle Studio</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0E1116;--panel:#171C24;--line:#262D38;--ink:#F4F2EB;--muted:#9AA7B8;--accent:#1E9B4B;--amber:#FFC400}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;min-height:100vh}
button,select,input{font-family:inherit;font-size:15px}
/* gate */
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
#gate form{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:34px;width:100%;max-width:380px;text-align:center}
#gate .orb{width:34px;height:34px;border-radius:50%;margin:0 auto 14px;background:conic-gradient(from 210deg,#1E9B4B,#FFC400,#0A3478,#ED2939,#1E9B4B)}
#gate h1{font-family:"Space Grotesk";font-size:22px;letter-spacing:-.4px;margin-bottom:6px}
#gate p{color:var(--muted);font-size:13px;margin-bottom:18px}
#gate input{width:100%;padding:13px 15px;border-radius:11px;border:1px solid var(--line);background:#0E1116;color:var(--ink);margin-bottom:12px}
#gate button{width:100%;padding:13px;border-radius:11px;border:0;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}
#gate .err{color:#FF6B6B;font-size:13px;height:16px;margin-top:8px}
/* app */
header{display:flex;align-items:center;gap:12px;padding:18px 24px;border-bottom:1px solid var(--line)}
header .orb{width:22px;height:22px;border-radius:50%;background:conic-gradient(from 210deg,#1E9B4B,#FFC400,#0A3478,#ED2939,#1E9B4B)}
header b{font-family:"Space Grotesk";font-weight:700;font-size:19px;letter-spacing:-.3px}
header span{color:var(--muted);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.layout{display:grid;grid-template-columns:380px 1fr;gap:0;min-height:calc(100vh - 61px)}
.controls{padding:22px 24px;border-right:1px solid var(--line);overflow:auto}
.seg{display:flex;gap:6px;background:#0E1116;border:1px solid var(--line);border-radius:12px;padding:5px;margin-bottom:22px}
.seg button{flex:1;padding:10px;border:0;border-radius:8px;background:transparent;color:var(--muted);font-weight:700;font-family:"Space Grotesk";cursor:pointer;letter-spacing:.5px}
.seg button.on{background:var(--accent);color:#fff}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.field select,.field input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:#0E1116;color:var(--ink)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hide{display:none}
.dl{width:100%;margin-top:8px;padding:15px;border-radius:12px;border:0;background:var(--amber);color:#11161F;font-weight:800;font-family:"Space Grotesk";font-size:16px;letter-spacing:.3px;cursor:pointer}
.dl:active{transform:translateY(1px)}
.status{margin-top:12px;font-size:13px;color:var(--muted);min-height:18px;text-align:center}
.preview{display:flex;align-items:center;justify-content:center;padding:30px;background:radial-gradient(60% 60% at 50% 30%,#12202f,#0E1116 75%)}
.stage{width:100%;max-width:620px;overflow:hidden;border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.stage iframe{width:1080px;height:1080px;border:0;transform-origin:top left;display:block;background:#fff}
@media (max-width:880px){.layout{grid-template-columns:1fr}.controls{border-right:0;border-bottom:1px solid var(--line)}}
</style>
</head>
<body>

<div id="gate">
  <form id="gateForm">
    <div class="orb"></div>
    <h1>Sportacle Studio</h1>
    <p>Internal tool. Enter the passphrase.</p>
    <input id="pass" type="password" autocomplete="off" placeholder="Passphrase" autofocus>
    <button type="submit">Enter</button>
    <div class="err" id="gateErr"></div>
  </form>
</div>

<div id="app" hidden>
  <header><span class="orb"></span><b>Sportacle Studio</b><span>Internal</span></header>
  <div class="layout">
    <div class="controls">
      <div class="seg" id="seg">
        <button data-type="goal">Goal</button>
        <button data-type="half">Half</button>
        <button data-type="final" class="on">Final</button>
      </div>

      <!-- result fields (final + half) -->
      <div id="resultFields">
        <div class="field"><label>Home team</label><select id="home"></select></div>
        <div class="field"><label>Away team</label><select id="away"></select></div>
        <div class="row">
          <div class="field"><label>Home goals</label><input id="hg" type="number" min="0" max="20" value="0"></div>
          <div class="field"><label>Away goals</label><input id="ag" type="number" min="0" max="20" value="0"></div>
        </div>
        <div class="field"><label>Note (optional)</label><input id="note" type="text" placeholder="e.g. Group L"></div>
      </div>

      <!-- goal fields -->
      <div id="goalFields" class="hide">
        <div class="field"><label>Scoring team</label><select id="gteam"></select></div>
        <div class="field"><label>Scorer (optional)</label><input id="scorer" type="text" placeholder="e.g. Kane"></div>
        <div class="row">
          <div class="field"><label>Minute (optional)</label><input id="gmin" type="text" placeholder="e.g. 67"></div>
          <div class="field"><label>Score (optional)</label><input id="gscore" type="text" placeholder="e.g. 2-1"></div>
        </div>
        <div class="field"><label>Opponent (for scoreline, optional)</label><select id="gvs"></select></div>
        <div class="field"><label>Tag (optional)</label><input id="gtag" type="text" placeholder="Sportacle"></div>
      </div>

      <button class="dl" id="dl">Download PNG (1080x1080)</button>
      <div class="status" id="status">Preview updates live.</div>
    </div>

    <div class="preview"><div class="stage" id="stage"><iframe id="frame" title="preview"></iframe></div></div>
  </div>
</div>

<script>
(function(){
  // ---- soft gate (deterrent; see note to Chase). Change PASS to rotate it. ----
  var PASS = "lariat-r32";
  var gate=document.getElementById("gate"), app=document.getElementById("app");
  function unlock(){ gate.style.display="none"; app.hidden=false; init(); }
  if(localStorage.getItem("studio-ok")==="1"){ unlock(); }
  document.getElementById("gateForm").addEventListener("submit",function(e){
    e.preventDefault();
    if(document.getElementById("pass").value===PASS){ localStorage.setItem("studio-ok","1"); unlock(); }
    else document.getElementById("gateErr").textContent="Incorrect.";
  });

  var TEAMS=[], started=false;
  var frame=document.getElementById("frame"), stage=document.getElementById("stage");
  var type="final";

  function init(){
    if(started) return; started=true;
    fetch("/make/teams.json").then(function(r){return r.json();}).then(function(d){
      TEAMS=d;
      ["home","away","gteam","gvs"].forEach(function(id){ fillSelect(id, id==="gvs"); });
      // sensible defaults
      setSel("home","England"); setSel("away","Croatia");
      setSel("gteam","England"); setSel("gvs","Croatia");
      document.getElementById("hg").value="4"; document.getElementById("ag").value="2";
      wire(); fit(); update();
    });
  }
  function fillSelect(id, blankFirst){
    var s=document.getElementById(id), html=blankFirst?'<option value="">None</option>':"";
    TEAMS.forEach(function(t){ html+='<option value="'+t.name+'" data-code="'+t.code+'" data-color="'+t.color+'">'+t.name+'</option>'; });
    s.innerHTML=html;
  }
  function setSel(id,name){ var s=document.getElementById(id); for(var i=0;i<s.options.length;i++){ if(s.options[i].value===name){ s.selectedIndex=i; break; } } }
  function opt(id){ var s=document.getElementById(id); return s.options[s.selectedIndex]||{}; }
  function val(id){ return (document.getElementById(id).value||"").trim(); }

  function buildSrc(){
    var p=new URLSearchParams();
    if(type==="goal"){
      var t=opt("gteam");
      p.set("team", t.value||""); p.set("code", t.getAttribute("data-code")||""); p.set("tc", t.getAttribute("data-color")||"");
      if(val("scorer")) p.set("scorer", val("scorer"));
      if(val("gmin")) p.set("min", val("gmin"));
      if(val("gtag")) p.set("tag", val("gtag"));
      var sc=val("gscore"), vs=opt("gvs");
      if(sc && vs && vs.value){ p.set("score", sc); p.set("vs", vs.getAttribute("data-code")||""); }
      return "/make/goal.html?"+p.toString();
    }
    var h=opt("home"), a=opt("away");
    p.set("an",h.value||""); p.set("ac",h.getAttribute("data-code")||""); p.set("acolor",h.getAttribute("data-color")||"");
    p.set("bn",a.value||""); p.set("bc",a.getAttribute("data-code")||""); p.set("bcolor",a.getAttribute("data-color")||"");
    p.set("hg", val("hg")||"0"); p.set("ag", val("ag")||"0");
    if(val("note")) p.set("note", val("note"));
    if(type==="half"){ p.set("label","Half Time"); p.set("lc","#FFC400"); } else { p.set("label","Full Time"); }
    return "/make/final.html?"+p.toString();
  }

  var t=null;
  function update(){ clearTimeout(t); t=setTimeout(function(){ frame.src=buildSrc(); }, 120); }
  function fit(){ var s=stage.clientWidth/1080; frame.style.transform="scale("+s+")"; stage.style.height=(1080*s)+"px"; }
  window.addEventListener("resize", fit);

  function wire(){
    document.querySelectorAll("#seg button").forEach(function(b){
      b.addEventListener("click",function(){
        document.querySelectorAll("#seg button").forEach(function(x){x.classList.remove("on");});
        b.classList.add("on"); type=b.getAttribute("data-type");
        document.getElementById("resultFields").classList.toggle("hide", type==="goal");
        document.getElementById("goalFields").classList.toggle("hide", type!=="goal");
        update();
      });
    });
    document.querySelectorAll(".controls select, .controls input").forEach(function(el){
      el.addEventListener("input", update); el.addEventListener("change", update);
    });
  }

  // ---- download via the iframe's verified export hook ----
  function fname(){
    if(type==="goal") return "sportacle-goal-"+(opt("gteam").getAttribute("data-code")||"x")+".png";
    return "sportacle-"+type+"-"+(opt("home").getAttribute("data-code")||"x")+"-"+(opt("away").getAttribute("data-code")||"x")+"-"+(val("hg")||0)+"-"+(val("ag")||0)+".png";
  }
  var statusEl=document.getElementById("status");
  document.getElementById("dl").addEventListener("click",function(){
    statusEl.textContent="Rendering...";
    frame.contentWindow.postMessage({type:"export",pixelRatio:2},"*");
  });
  window.addEventListener("message",function(e){
    if(!e.data) return;
    if(e.data.type==="exported"){
      var a=document.createElement("a"); a.href=e.data.dataUrl; a.download=fname();
      document.body.appendChild(a); a.click(); a.remove();
      statusEl.textContent="Downloaded "+fname();
    } else if(e.data.type==="export-error"){
      statusEl.textContent="Export failed: "+e.data.error;
    }
  });
})();
</script>
</body>
</html>
