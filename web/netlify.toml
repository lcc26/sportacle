# Sportacle static site. Deploy this folder:  netlify deploy --dir=web --prod
# Or point a Netlify site's publish directory at this folder.
[build]
  publish = "."

# Predictions refresh often during the tournament; keep that file lightly cached
# so a redeploy of data/predictions.json shows up quickly.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=60"

[[headers]]
  for = "/flags/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
