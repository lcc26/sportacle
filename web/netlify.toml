# Sportacle static site. Deploy this folder:  netlify deploy --dir=web --prod
#
# NOTE: we deploy with `netlify deploy --dir=web`, and the CLI resolves netlify.toml
# from the working directory (repo root), NOT from --dir. So [[headers]] and
# [[redirects]] here are NOT applied. The active config lives in files Netlify reads
# from the publish-dir root instead:  web/_headers  and  web/_redirects.
[build]
  publish = "."
