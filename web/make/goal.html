<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sportacle GOAL card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Khand:wght@500;600;700&family=Barlow+Semi+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#11161F;--team:#1E9B4B;--display:"Khand",sans-serif;--ui:"Barlow Semi Condensed",sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden;background:#000}
body{font-family:var(--ui);-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}
.card{position:relative;width:1080px;height:1080px;overflow:hidden;background:var(--team)}
.flag{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(1.12) contrast(1.03)}
.tint{position:absolute;inset:0;z-index:2;background:var(--team);mix-blend-mode:multiply;opacity:.42}
.vign{position:absolute;inset:0;z-index:3;background:radial-gradient(120% 90% at 50% 28%, rgba(0,0,0,0) 38%, rgba(0,0,0,.55) 100%)}
.shade{position:absolute;inset:0;z-index:3;background:linear-gradient(180deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,0) 26%, rgba(0,0,0,0) 52%, rgba(0,0,0,.82) 100%)}
.blade{position:absolute;top:0;left:0;width:1080px;height:1080px;z-index:4;pointer-events:none;
  background:linear-gradient(135deg, #FFC400 0 14px, transparent 14px),
             linear-gradient(135deg, transparent 26px, #ED2939 26px 38px, transparent 38px);
  clip-path:polygon(0 0, 360px 0, 0 360px)}
.tag{position:absolute;top:60px;left:64px;z-index:10;font-family:var(--ui);font-weight:800;font-size:26px;letter-spacing:6px;text-transform:uppercase;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.6)}
.hero{position:absolute;left:64px;right:64px;bottom:212px;z-index:12}
.team{font-family:var(--ui);font-weight:800;font-size:46px;letter-spacing:8px;text-transform:uppercase;color:#fff;text-shadow:0 3px 14px rgba(0,0,0,.7);margin-bottom:-6px}
.big{font-family:var(--display);font-weight:700;font-size:340px;line-height:.74;letter-spacing:-2px;text-transform:uppercase;color:#fff;text-shadow:0 10px 40px rgba(0,0,0,.6)}
.big .bang{color:#FFC400}
.scorer{margin-top:14px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.scorer .who{font-family:var(--display);font-weight:600;font-size:64px;line-height:.9;text-transform:uppercase;color:#fff;text-shadow:0 3px 14px rgba(0,0,0,.7)}
.scorer .min{font-family:var(--ui);font-weight:800;font-size:34px;letter-spacing:1px;color:var(--ink);background:#FFC400;padding:7px 16px 5px;border-radius:10px}
.line{position:absolute;left:50%;bottom:140px;transform:translateX(-50%);z-index:13;display:none;align-items:center;gap:18px;background:rgba(255,255,255,.95);padding:12px 26px;border-radius:999px;box-shadow:0 14px 34px rgba(0,0,0,.4)}
.line.on{display:flex}
.line img{width:58px;height:39px;object-fit:cover;border-radius:5px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.line .sc{font-family:var(--display);font-weight:700;font-size:62px;line-height:.8;color:var(--ink);letter-spacing:1px}
.brand{position:absolute;left:0;right:0;bottom:46px;z-index:14;text-align:center}
.wm{font-family:var(--display);font-weight:700;font-size:42px;letter-spacing:3px;text-transform:uppercase;color:#fff}
.wm b{color:#FFC400}
.hand{font-family:var(--ui);font-weight:700;font-size:19px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.82);margin-left:12px}
</style>
</head>
<body>
<div class="card">
  <img class="flag" id="flag" alt="">
  <div class="tint"></div><div class="vign"></div><div class="shade"></div><div class="blade"></div>
  <div class="tag" id="tag">Sportacle</div>
  <div class="hero">
    <div class="team" id="team">TEAM</div>
    <div class="big">GOAL<span class="bang">!</span></div>
    <div class="scorer" id="scorerWrap" style="display:none">
      <span class="who" id="scorer"></span><span class="min" id="min" style="display:none"></span>
    </div>
  </div>
  <div class="line" id="line"><img id="lflagA" alt=""><span class="sc" id="lscore">0-0</span><img id="lflagB" alt=""></div>
  <div class="brand"><span class="wm">Sport<b>acle</b></span><span class="hand">gosportacle.com</span></div>
</div>
<script>
(function(){
  var q=new URLSearchParams(location.search);
  function v(k,d){var x=q.get(k);return (x===null||x==="")?d:x;}
  var fbase=(location.protocol==="file:")?"../flags/":"/flags/";
  var team=v("team",v("an","Team")),tc=v("tc",v("acolor","#1E9B4B")),code=v("code",v("ac",""));
  var scorer=v("scorer",""),min=v("min",""),tag=v("tag","Sportacle");
  var score=v("score",""),vsCode=v("vs",""),leftIsTeam=v("home","1");
  document.documentElement.style.setProperty("--team",tc);
  if(code)document.getElementById("flag").src=fbase+code+".png";
  document.getElementById("tag").textContent=tag;
  document.getElementById("team").textContent=team.toUpperCase();
  if(scorer){
    document.getElementById("scorerWrap").style.display="";
    document.getElementById("scorer").textContent=scorer.toUpperCase();
    if(min){var m=document.getElementById("min");m.style.display="";m.textContent=/'$/.test(min)?min:(min+"'");}
  }
  if(score&&vsCode){
    document.getElementById("line").classList.add("on");
    document.getElementById("lscore").textContent=score.replace(/\s/g,"").replace("-"," - ");
    var leftCode=(leftIsTeam==="0")?vsCode:code,rightCode=(leftIsTeam==="0")?code:vsCode;
    if(leftCode)document.getElementById("lflagA").src=fbase+leftCode+".png";
    if(rightCode)document.getElementById("lflagB").src=fbase+rightCode+".png";
  }
})();
</script>
<!-- Export hook (see final.html): rasterize self on postMessage; idle otherwise. -->
<script src="html-to-image.js"></script>
<script>
(function(){
  function exportCard(opts){
    var card=document.querySelector(".card");
    return document.fonts.ready.then(function(){
      return window.htmlToImage.toPng(card,{width:1080,height:1080,pixelRatio:(opts&&opts.pixelRatio)||2,cacheBust:true});
    });
  }
  window.addEventListener("message",function(e){
    if(!e.data||e.data.type!=="export")return;
    exportCard(e.data).then(function(u){e.source.postMessage({type:"exported",dataUrl:u},"*");})
      .catch(function(err){e.source.postMessage({type:"export-error",error:String(err)},"*");});
  });
  if(new URLSearchParams(location.search).get("export")==="1"){
    var ta=document.createElement("textarea");ta.id="exp";ta.style.cssText="position:fixed;left:-99999px;top:0;width:10px;height:10px";
    document.body.appendChild(ta);
    exportCard({pixelRatio:1}).then(function(u){ta.textContent=u;ta.setAttribute("data-done","1");})
      .catch(function(err){ta.textContent="ERR "+err;ta.setAttribute("data-done","1");});
  }
})();
</script>
</body>
</html>
