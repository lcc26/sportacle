<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Khand:wght@500;600;700&family=Barlow+Semi+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --br-green:#009B3A;
  --br-green-dk:#02702B;
  --br-yellow:#FEDD00;
  --kr-blue:#0B3D91;
  --kr-red:#C8102E;
  --ink:#11161F;
  --display:"Khand",sans-serif;
  --ui:"Barlow Semi Condensed",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden;background:#ffffff}
body{font-family:var(--ui);-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}

.card{position:relative;width:1080px;height:1080px;overflow:hidden;background:#ffffff}

/* ===== TEAM HALVES (diagonal split) : each flag is a SOLID, full-color hero ===== */
.half{position:absolute;top:0;bottom:0;width:1080px;height:1080px;overflow:hidden}

/* boundary runs from x=614 (top) to x=466 (bottom) */
/* LEFT - BRAZIL : solid filled diagonal half. Flag pushed OUTWARD (left) so the
   yellow diamond + globe sit in the heart of Brazil's own half, clear of the seam. */
.left{clip-path:polygon(0 0, 614px 0, 466px 1080px, 0 1080px);background:var(--br-green)}
.left .flag{position:absolute;inset:0;width:100%;height:100%;
   object-fit:cover;object-position:100% 50%;
   filter:saturate(1.12) contrast(1.04)}
/* slim top+bottom team-color scrims ONLY where text sits, so the flag stays crisp in the middle */
.left .scrim-t{position:absolute;top:0;left:0;right:0;height:300px;z-index:3;
   background:linear-gradient(180deg, rgba(2,80,32,.80) 0%, rgba(2,80,32,.30) 60%, rgba(2,80,32,0) 100%)}
.left .scrim-b{position:absolute;bottom:0;left:0;right:0;height:300px;z-index:3;
   background:linear-gradient(0deg, rgba(2,80,32,.82) 0%, rgba(2,80,32,.34) 52%, rgba(2,80,32,0) 100%)}

/* RIGHT - SOUTH KOREA : solid filled diagonal half, white field. Flag pushed
   OUTWARD (right) so the taegeuk reads complete in the heart of Korea's own half. */
.right{clip-path:polygon(614px 0, 1080px 0, 1080px 1080px, 466px 1080px);background:#ffffff}
.right .flag{position:absolute;inset:0;width:100%;height:100%;
   object-fit:cover;object-position:0% 50%;
   filter:saturate(1.10) contrast(1.04)}
/* on the white Korea field, text needs a light-to-clear veil so dark type reads */
.right .scrim-t{position:absolute;top:0;left:0;right:0;height:300px;z-index:3;
   background:linear-gradient(180deg, rgba(255,255,255,.88) 0%, rgba(255,255,255,.42) 60%, rgba(255,255,255,0) 100%)}
.right .scrim-b{position:absolute;bottom:0;left:0;right:0;height:300px;z-index:3;
   background:linear-gradient(0deg, rgba(255,255,255,.90) 0%, rgba(255,255,255,.40) 52%, rgba(255,255,255,0) 100%)}

/* the seam : crisp white blade tracing the exact diagonal, derived from the flags */
.seam{position:absolute;inset:0;z-index:6;pointer-events:none;
   background:#ffffff;
   clip-path:polygon(607px 0, 621px 0, 473px 1080px, 459px 1080px)}
.seam-edge{position:absolute;inset:0;z-index:5;pointer-events:none;
   background:linear-gradient(180deg, var(--br-yellow), var(--kr-red));
   clip-path:polygon(601px 0, 627px 0, 479px 1080px, 453px 1080px);opacity:.9}

/* ===== TEAM NAME PLATES ===== */
.names{position:absolute;top:66px;left:0;right:0;z-index:20;
   display:flex;justify-content:space-between;padding:0 76px}
.team{width:380px}
.team.b{text-align:left}
.team.k{text-align:right}
.seed{font-family:var(--ui);font-weight:800;font-size:22px;letter-spacing:5px;
   text-transform:uppercase;margin-bottom:2px}
.team.b .seed{color:var(--br-yellow)}
.team.k .seed{color:var(--kr-red)}
.nm{font-family:var(--display);font-weight:700;font-size:112px;line-height:.82;
   text-transform:uppercase;letter-spacing:0px}
.team.b .nm{color:#fff;text-shadow:0 3px 16px rgba(0,40,16,.55)}
.team.k .nm{color:var(--ink);text-shadow:0 2px 10px rgba(255,255,255,.9)}
.nm.two{font-size:96px;margin-top:-4px}

/* ===== CENTER : neutral VS medallion, dead-center on the seam, between the flags ===== */
.medal{position:absolute;left:50%;top:486px;transform:translate(-50%,-50%);
   z-index:22;
   width:158px;height:158px;border-radius:50%;
   display:flex;align-items:center;justify-content:center;
   background:#ffffff;
   border:5px solid var(--ink);
   box-shadow:0 0 0 9px rgba(255,255,255,.94),0 22px 50px rgba(0,0,0,.38)}
.medal:before{content:"";position:absolute;inset:11px;border-radius:50%;
   border:2px solid rgba(17,22,31,.22)}
.vs{font-family:var(--display);font-weight:700;font-size:88px;line-height:1;
   color:var(--ink);letter-spacing:1px}

/* ===== LOWER STAT BAND : the big probability sits below BOTH flag emblems,
   narrow enough that the round taegeuk and the Brazil globe stay clear of it ===== */
.stat{position:absolute;left:50%;bottom:170px;transform:translateX(-50%);
   z-index:21;text-align:center;
   padding:18px 50px 22px;border-radius:30px;
   background:rgba(255,255,255,.96);
   box-shadow:0 20px 54px rgba(0,0,0,.26)}
.bignum{font-family:var(--display);font-weight:700;font-size:208px;line-height:.76;
   color:var(--ink);letter-spacing:-3px;display:inline-block}
.bignum .pc{font-size:106px;vertical-align:top;margin-left:4px;
   -webkit-text-fill-color:var(--br-green);color:var(--br-green)}
.statlabel{font-family:var(--ui);font-weight:800;font-size:26px;letter-spacing:7px;
   text-transform:uppercase;color:var(--ink);margin-top:8px}

/* ===== BRAND FOOTER ===== */
.brand{position:absolute;left:0;right:0;bottom:48px;z-index:22;text-align:center}
.wm{font-family:var(--display);font-weight:700;font-size:46px;letter-spacing:3px;
   text-transform:uppercase;line-height:1;color:var(--ink);
   display:inline-block;padding:8px 26px;border-radius:999px;
   background:rgba(255,255,255,.94);box-shadow:0 10px 28px rgba(0,0,0,.22)}
.wm b{color:var(--br-green);font-weight:700}
.hand{font-family:var(--ui);font-weight:700;font-size:20px;letter-spacing:3px;
   text-transform:uppercase;color:var(--ink);margin-top:10px;
   display:inline-block;padding:5px 16px;border-radius:999px;
   background:rgba(255,255,255,.88)}
.samp{position:absolute;right:30px;bottom:26px;z-index:23;
   font-family:var(--ui);font-weight:700;font-size:15px;letter-spacing:3px;
   text-transform:uppercase;color:rgba(17,22,31,.55)}
</style>
</head>
<body>
<div class="card">

  <!-- LEFT : BRAZIL -->
  <div class="half left">
    <img class="flag" id="flagBR" alt="Brazil flag">
    <div class="scrim-t"></div>
    <div class="scrim-b"></div>
  </div>

  <!-- RIGHT : SOUTH KOREA -->
  <div class="half right">
    <img class="flag" id="flagKR" alt="South Korea flag">
    <div class="scrim-t"></div>
    <div class="scrim-b"></div>
  </div>

  <div class="seam-edge"></div>
  <div class="seam"></div>

  <!-- name plates -->
  <div class="names">
    <div class="team b">
      <div class="seed">Winner Group G</div>
      <div class="nm">Brazil</div>
    </div>
    <div class="team k">
      <div class="seed">Projected Foe</div>
      <div class="nm nm two">South<br>Korea</div>
    </div>
  </div>

  <!-- center : VS medallion on the seam -->
  <div class="medal"><span class="vs">VS</span></div>

  <!-- lower stat band : the big probability -->
  <div class="stat">
    <div class="bignum">38<span class="pc">%</span></div>
    <div class="statlabel">Matchup Probability</div>
  </div>

  <!-- brand -->
  <div class="brand">
    <div class="wm">Sport<b>acle</b></div>
    <div class="hand">@TheSportacle · gosportacle.com</div>
  </div>
  <div class="samp">Sample</div>

</div>
