<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Khand:wght@500;600;700&family=Barlow+Semi+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --br-green:#009B3A;
  --br-yellow:#FEDD00;
  --kr-blue:#0B3D91;
  --kr-red:#C8102E;
  --ink:#0A0F1C;
  --paper:#F4F6FA;
  --display:"Khand",sans-serif;
  --ui:"Barlow Semi Condensed",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden;background:var(--ink)}
body{font-family:var(--ui);-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}

.card{position:relative;width:1080px;height:1080px;overflow:hidden;background:var(--ink)}

/* ===== TEAM HALVES (diagonal split) ===== */
.half{position:absolute;top:0;bottom:0;width:1080px;height:1080px;overflow:hidden}

/* LEFT - BRAZIL : clipped to a diagonal, leans left */
.left{clip-path:polygon(0 0, 612px 0, 468px 1080px, 0 1080px)}
.left .wash{position:absolute;inset:0;background:
   linear-gradient(135deg, rgba(0,155,58,.14) 0%, rgba(0,96,36,.72) 62%, rgba(4,58,24,.92) 100%);
   z-index:2}
.left .flag{position:absolute;top:50%;left:0;transform:translateY(-50%);
   width:760px;height:auto;z-index:1;
   filter:saturate(1.18) contrast(1.06);
   -webkit-mask-image:linear-gradient(105deg, #000 60%, transparent 99%);
           mask-image:linear-gradient(105deg, #000 60%, transparent 99%)}

/* RIGHT - SOUTH KOREA : mirror diagonal, leans right */
.right{clip-path:polygon(612px 0, 1080px 0, 1080px 1080px, 468px 1080px)}
.right .wash{position:absolute;inset:0;background:
   linear-gradient(225deg, rgba(200,16,46,.22) 0%, rgba(11,61,145,.82) 60%, rgba(7,30,72,.95) 100%);
   z-index:2}
.right .flag{position:absolute;top:50%;right:0;transform:translateY(-50%);
   width:760px;height:auto;z-index:1;
   filter:saturate(1.12) contrast(1.05);
   -webkit-mask-image:linear-gradient(255deg, #000 60%, transparent 99%);
           mask-image:linear-gradient(255deg, #000 60%, transparent 99%)}

/* the seam glow line : clipped to trace the exact diagonal boundary
   boundary runs from x=612 (top) to x=468 (bottom) */
.seam{position:absolute;inset:0;z-index:5;pointer-events:none;
   background:linear-gradient(180deg, var(--br-yellow), #fff 50%, var(--kr-red));
   clip-path:polygon(606px 0, 614px 0, 470px 1080px, 462px 1080px);
   filter:drop-shadow(0 0 18px rgba(255,255,255,.65)) drop-shadow(0 0 42px rgba(254,221,0,.32))}

/* vignette for punch */
.vig{position:absolute;inset:0;z-index:6;pointer-events:none;
   background:radial-gradient(120% 95% at 50% 42%, transparent 52%, rgba(0,0,0,.55) 100%)}

/* ===== TOP : framing + brand ===== */
.topbar{position:absolute;top:58px;left:0;right:0;z-index:20;text-align:center}
.frame{font-family:var(--ui);font-weight:800;font-size:25px;letter-spacing:9px;
   text-transform:uppercase;color:#fff;
   text-shadow:0 2px 14px rgba(0,0,0,.7)}

/* ===== TEAM NAME PLATES ===== */
.names{position:absolute;top:172px;left:0;right:0;z-index:20;
   display:flex;justify-content:space-between;padding:0 70px}
.team{width:360px}
.team.b{text-align:left}
.team.k{text-align:right}
.seed{font-family:var(--ui);font-weight:800;font-size:21px;letter-spacing:5px;
   text-transform:uppercase;margin-bottom:-6px}
.team.b .seed{color:var(--br-yellow)}
.team.k .seed{color:#fff}
.nm{font-family:var(--display);font-weight:700;font-size:104px;line-height:.84;
   text-transform:uppercase;color:#fff;letter-spacing:0px;
   text-shadow:0 3px 22px rgba(0,0,0,.75)}
.nm.two{font-size:104px}

/* ===== CENTER : VS medallion + the big stat ===== */
.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
   z-index:22;text-align:center}
.medal{width:188px;height:188px;border-radius:50%;margin:0 auto;
   display:flex;align-items:center;justify-content:center;
   background:radial-gradient(circle at 38% 30%, #1c2740, #0a0f1c 78%);
   border:5px solid rgba(255,255,255,.92);
   box-shadow:0 0 0 12px rgba(10,15,28,.55),0 22px 60px rgba(0,0,0,.6),
              0 0 60px rgba(255,255,255,.18);
   position:relative}
.medal:before{content:"";position:absolute;inset:14px;border-radius:50%;
   border:2px solid rgba(255,255,255,.18)}
.vs{font-family:var(--display);font-weight:700;font-size:108px;line-height:1;
   color:#fff;letter-spacing:2px;text-shadow:0 3px 14px rgba(0,0,0,.6)}

.statwrap{margin-top:30px}
.bignum{font-family:var(--display);font-weight:700;font-size:230px;line-height:.78;
   color:#fff;letter-spacing:-3px;
   text-shadow:0 6px 30px rgba(0,0,0,.7);position:relative;display:inline-block}
.bignum .pc{font-size:118px;vertical-align:top;margin-left:4px;
   -webkit-text-fill-color:var(--br-yellow);color:var(--br-yellow)}
.statlabel{font-family:var(--ui);font-weight:800;font-size:26px;letter-spacing:7px;
   text-transform:uppercase;color:#fff;margin-top:2px;
   text-shadow:0 2px 12px rgba(0,0,0,.7)}

/* ===== ALTERNATES STRIP ===== */
.alts{position:absolute;left:50%;bottom:118px;transform:translateX(-50%);z-index:22;
   display:flex;gap:16px}
.alt{display:flex;align-items:center;gap:11px;
   background:rgba(10,15,28,.62);border:1.5px solid rgba(255,255,255,.20);
   border-radius:999px;padding:9px 20px 9px 11px;
   backdrop-filter:blur(2px)}
.alt img{width:40px;height:27px;object-fit:cover;border-radius:4px;
   box-shadow:0 1px 4px rgba(0,0,0,.5)}
.alt .an{font-family:var(--ui);font-weight:800;font-size:22px;letter-spacing:1px;
   text-transform:uppercase;color:#fff}
.alt .ap{font-family:var(--display);font-weight:700;font-size:30px;color:var(--br-yellow);line-height:1}

/* ===== BRAND FOOTER ===== */
.brand{position:absolute;left:0;right:0;bottom:48px;z-index:22;text-align:center}
.wm{font-family:var(--display);font-weight:700;font-size:42px;letter-spacing:3px;
   text-transform:uppercase;color:#fff;line-height:1;
   text-shadow:0 2px 12px rgba(0,0,0,.7)}
.wm b{color:var(--br-yellow);font-weight:700}
.hand{font-family:var(--ui);font-weight:700;font-size:19px;letter-spacing:3px;
   text-transform:uppercase;color:rgba(255,255,255,.78);margin-top:3px}
.samp{position:absolute;right:30px;bottom:26px;z-index:22;
   font-family:var(--ui);font-weight:700;font-size:14px;letter-spacing:3px;
   text-transform:uppercase;color:rgba(255,255,255,.42)}
</style>
</head>
