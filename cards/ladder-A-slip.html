<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0E16;--surface:#141B27;--surface-2:#1E2736;--line:#2B3445;
  --brand:#FFB627;--up:#23D18B;--down:#FF4D5E;
  --text:#F2F5FA;--dim:#8C9AAE;--faint:#586577;
  --display:"Saira Condensed",sans-serif;--ui:"Inter",sans-serif;--num:"JetBrains Mono",monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden;background:var(--bg)}
body{font-family:var(--ui);color:var(--text);-webkit-font-smoothing:antialiased}
.card{width:1080px;height:1080px;padding:72px 72px 64px;display:flex;flex-direction:column;background:var(--bg)}
.top{display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:14px;font-family:var(--display);font-weight:900;font-size:38px;letter-spacing:1px;color:var(--brand);text-transform:uppercase}
.orb{width:26px;height:26px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 6px rgba(255,182,39,.16)}
.ctx{font-family:var(--ui);font-weight:600;font-size:19px;letter-spacing:4px;color:var(--faint);text-transform:uppercase}
.head{margin-top:60px}
.team{font-family:var(--display);font-weight:900;font-size:96px;line-height:.9;letter-spacing:-1px;color:var(--text);text-transform:uppercase}
.sub{margin-top:12px;font-family:var(--ui);font-weight:700;font-size:26px;letter-spacing:4px;color:var(--dim);text-transform:uppercase}
.rows{margin-top:46px;display:flex;flex-direction:column}
.row{padding:20px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.rmain{display:flex;align-items:baseline;gap:26px}
.stage{width:104px;font-family:var(--num);font-weight:700;font-size:22px;letter-spacing:2px;color:var(--brand);text-transform:uppercase}
.opp{flex:1;font-family:var(--display);font-weight:800;font-size:52px;line-height:1;color:var(--text);text-transform:uppercase}
.opp small{margin-right:12px;font-family:var(--ui);font-weight:700;font-size:22px;letter-spacing:1px;color:var(--faint);text-transform:uppercase}
.pct{font-family:var(--num);font-weight:800;font-size:42px;color:var(--up);text-align:right}
.track{margin-top:14px;height:6px;background:var(--surface-2);border-radius:4px;overflow:hidden}
.track i{display:block;height:100%;background:var(--up);border-radius:4px}
.foot{margin-top:auto;display:flex;justify-content:space-between;align-items:center}
.handle{font-family:var(--ui);font-weight:700;font-size:24px;color:var(--text)}
.handle span{color:var(--brand)}
.note{font-family:var(--ui);font-weight:600;font-size:16px;color:var(--faint);letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="brand"><span class="orb"></span>Sportacle</div>
    <div class="ctx">World Cup 2026</div>
  </div>
  <div class="head">
    <div class="team">Argentina</div>
    <div class="sub">Projected path to the final</div>
  </div>
  <div class="rows">
    <div class="row"><div class="rmain"><div class="stage">R32</div><div class="opp"><small>vs</small>Nigeria</div><div class="pct">92%</div></div><div class="track"><i style="width:92%"></i></div></div>
    <div class="row"><div class="rmain"><div class="stage">R16</div><div class="opp"><small>vs</small>England</div><div class="pct">64%</div></div><div class="track"><i style="width:64%"></i></div></div>
    <div class="row"><div class="rmain"><div class="stage">QF</div><div class="opp"><small>vs</small>France</div><div class="pct">41%</div></div><div class="track"><i style="width:41%"></i></div></div>
    <div class="row"><div class="rmain"><div class="stage">SF</div><div class="opp"><small>vs</small>Spain</div><div class="pct">24%</div></div><div class="track"><i style="width:24%"></i></div></div>
    <div class="row"><div class="rmain"><div class="stage">Final</div><div class="opp"><small>vs</small>Brazil</div><div class="pct">14%</div></div><div class="track"><i style="width:14%"></i></div></div>
  </div>
  <div class="foot">
    <div class="handle">@<span>TheSportacle</span></div>
    <div class="note">Sample · chance to reach each round</div>
  </div>
</div>
</body>
</html>
