<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0E16;--surface:#141B27;--surface-2:#1E2736;--line:#2B3445;
  --brand:#FFB627;--up:#23D18B;--down:#FF4D5E;
  --text:#F2F5FA;--dim:#8C9AAE;--faint:#586577;
  --display:"Saira Condensed",sans-serif;--ui:"Inter",sans-serif;--num:"JetBrains Mono",monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px;overflow:hidden;background:var(--bg)}
body{font-family:var(--ui);color:var(--text);-webkit-font-smoothing:antialiased}
.card{position:relative;width:1080px;height:1080px;padding:72px 72px 60px 90px;display:flex;flex-direction:column;background:var(--bg)}
.stripe{position:absolute;left:0;top:0;bottom:0;width:18px;background:var(--brand)}
.top{display:flex;justify-content:space-between;align-items:center}
.brand{display:flex;align-items:center;gap:14px;font-family:var(--display);font-weight:900;font-size:36px;letter-spacing:1px;color:var(--brand);text-transform:uppercase}
.orb{width:24px;height:24px;border-radius:50%;background:var(--brand);box-shadow:0 0 0 6px rgba(255,182,39,.16)}
.kicker{font-family:var(--ui);font-weight:700;font-size:19px;letter-spacing:5px;color:var(--faint);text-transform:uppercase}
.head{margin-top:52px;margin-bottom:40px}
.kick{font-family:var(--ui);font-weight:700;font-size:20px;letter-spacing:5px;color:var(--brand);text-transform:uppercase}
.h1{margin-top:10px;font-family:var(--display);font-weight:900;font-size:88px;line-height:.88;letter-spacing:-1px;color:var(--text);text-transform:uppercase}
.rows{display:flex;flex-direction:column;gap:13px}
.row{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 24px}
.rfill{position:absolute;left:0;top:0;bottom:0;background:rgba(35,209,139,.12);z-index:0}
.rc{position:relative;z-index:1;display:flex;align-items:center;gap:22px;width:100%}
.stage{min-width:92px;text-align:center;font-family:var(--num);font-weight:800;font-size:21px;letter-spacing:1px;color:#06301F;background:var(--brand);padding:9px 14px;border-radius:8px;text-transform:uppercase}
.opp{flex:1;font-family:var(--display);font-weight:800;font-size:50px;line-height:1;color:var(--text);text-transform:uppercase}
.opp small{margin-right:10px;font-family:var(--ui);font-weight:700;font-size:22px;color:var(--faint);text-transform:uppercase}
.pct{font-family:var(--num);font-weight:800;font-size:40px;color:var(--up)}
.foot{margin-top:auto;display:flex;justify-content:space-between;align-items:center}
.handle{font-family:var(--ui);font-weight:700;font-size:23px;color:var(--text)}
.handle span{color:var(--brand)}
.note{font-family:var(--ui);font-weight:600;font-size:16px;color:var(--faint);letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>
<div class="card">
  <div class="stripe"></div>
  <div class="top">
    <div class="brand"><span class="orb"></span>Sportacle</div>
    <div class="kicker">The Ladder · Projected</div>
  </div>
  <div class="head">
    <div class="kick">Argentina</div>
    <div class="h1">Road to the Final</div>
  </div>
  <div class="rows">
    <div class="row"><div class="rfill" style="width:92%"></div><div class="rc"><div class="stage">R32</div><div class="opp"><small>vs</small>Nigeria</div><div class="pct">92%</div></div></div>
    <div class="row"><div class="rfill" style="width:64%"></div><div class="rc"><div class="stage">R16</div><div class="opp"><small>vs</small>England</div><div class="pct">64%</div></div></div>
    <div class="row"><div class="rfill" style="width:41%"></div><div class="rc"><div class="stage">QF</div><div class="opp"><small>vs</small>France</div><div class="pct">41%</div></div></div>
    <div class="row"><div class="rfill" style="width:24%"></div><div class="rc"><div class="stage">SF</div><div class="opp"><small>vs</small>Spain</div><div class="pct">24%</div></div></div>
    <div class="row"><div class="rfill" style="width:14%"></div><div class="rc"><div class="stage">Final</div><div class="opp"><small>vs</small>Brazil</div><div class="pct">14%</div></div></div>
  </div>
  <div class="foot">
    <div class="handle">@<span>TheSportacle</span> · gosportacle.com</div>
    <div class="note">Sample · chance to reach each round</div>
  </div>
</div>
</body>
</html>
